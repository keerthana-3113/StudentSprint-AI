<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentSprint AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📚 StudentSprint AI</h1>
        <p class="tagline">Generate a personalized study plan using AI.</p>

        <div class="form-container">

            <label>Subjects</label>
            <textarea id="subjects" placeholder="Example: DSA, Java, Maths, Software Engineering"></textarea>

            <div class="date-row">
                <div class="date-group">
                    <label>Start Date</label>
                    <input type="date" id="startDate">
                </div>
                <div class="date-group">
                    <label>Exam Date</label>
                    <input type="date" id="examDate">
                </div>
            </div>

            <label>Study Hours Per Day</label>
            <input type="number" id="studyHours" placeholder="Enter hours">

            <button id="generateBtn">Generate Study Plan</button>

        </div>

        <div class="output-container">
            <h2>Your Study Plan</h2>
            <div id="result">Your generated plan will appear here...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
